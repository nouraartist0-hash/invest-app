<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="color-scheme" content="dark"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>02 — تسجيل الدخول</title><link rel="stylesheet" href="../assets/style.css?v=1784451053">
<style>
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.divider .line{flex:1;height:1px;background:var(--line);}
.divider span{font-size:12.5px;color:var(--text-muted);}
.socials{display:flex;gap:12px;margin-bottom:24px;}
.social-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--bg-surface);border:1px solid var(--line);border-radius:var(--radius-field);padding:13px 0;font-size:14px;font-weight:500;}
.social-btn svg{width:18px;height:18px;}
.bottom-note{text-align:center;font-size:14px;color:var(--text-muted);padding:0 0 26px;margin-top:auto;}
.bottom-note b{color:var(--gold-soft);font-family:var(--font-display);font-weight:700;}
.checkbox{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--line);}
.remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);}
.forgot{font-size:13px;color:var(--gold-soft);font-family:var(--font-display);font-weight:600;}
.form-msg{display:none;font-size:13px;text-align:center;margin-bottom:14px;font-weight:600;}
</style></head>
<body><div class="device"><div class="statusbar"><span>٩:٤١</span><span>●●●</span></div>
<div class="screen">
  <div class="top-row"><div></div><a href="01-splash.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#F5F7FA" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></a></div>
  <div class="eyebrow">تسجيل الدخول</div>
  <div class="title">أهلاً بعودتك</div>
  <div class="subtitle">سجّل دخولك لمتابعة حصصك وعوائد مواشيك أولاً بأول</div>
  <div style="height:26px"></div>
  <div class="field-group"><label class="label">رقم الهاتف</label>
    <div class="field focused"><svg viewBox="0 0 24 24" fill="none" stroke="#D9A63A" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.12.9.32 1.78.6 2.63a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.45-1.17a2 2 0 012.11-.45c.85.28 1.73.48 2.63.6A2 2 0 0122 16.92z"/></svg>
    <input id="phone" type="tel" placeholder="٧٧٠ ١٢٣ ٤٥٦٧"/></div></div>
  <div class="field-group"><label class="label">كلمة المرور</label>
    <div class="field"><svg viewBox="0 0 24 24" fill="none" stroke="#D9A63A" stroke-width="1.8"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    <input id="password" type="password" placeholder="••••••••"/></div></div>
  <div class="row-between" style="margin:6px 0 24px;">
    <div class="remember"><div class="checkbox"></div>تذكرني</div>
    <a class="forgot" href="05-forgot-password.html">نسيت كلمة المرور؟</a>
  </div>
  <div id="formMsg" class="form-msg"></div>
  <button id="submitBtn" class="cta" onclick="handleLogin()">تسجيل الدخول</button>
  <div class="divider"><div class="line"></div><span>أو تابع عبر</span><div class="line"></div></div>
  <div class="socials">
    <div class="social-btn"><svg viewBox="0 0 24 24"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.24 1.4-1.7 4.1-5.5 4.1-3.3 0-6-2.7-6-6.2s2.7-6.2 6-6.2c1.9 0 3.1.8 3.9 1.5l2.7-2.6C16.9 3.1 14.7 2 12 2 6.9 2 2.7 6.1 2.7 12S6.9 22 12 22c6.9 0 9.3-4.9 9.3-7.4 0-.5 0-.9-.1-1.3H12z"/></svg>غوغل</div>
    <div class="social-btn"><svg viewBox="0 0 24 24" fill="#1877F2"><path d="M22 12a10 10 0 10-11.5 9.9v-7H7.9V12h2.6V9.8c0-2.6 1.5-4 3.9-4 1.1 0 2.3.2 2.3.2v2.5h-1.3c-1.3 0-1.7.8-1.7 1.6V12h2.9l-.5 2.9h-2.4v7A10 10 0 0022 12z"/></svg>فيسبوك</div>
  </div>
  <a class="bottom-note" href="03-register.html">ماعندك حساب؟ <b>إنشاء حساب جديد</b></a>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
async function handleLogin(){
  const phoneRaw = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');

  if(!phoneRaw || !password){
    showFormMessage('formMsg','الرجاء إدخال رقم الهاتف وكلمة المرور',true); return;
  }

  btn.disabled = true; btn.textContent = 'جاري الدخول...';

  const email = phoneToInternalEmail(phoneRaw);

  try{
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if(error){
      showFormMessage('formMsg','رقم الهاتف أو كلمة المرور غير صحيحة',true);
      btn.disabled = false; btn.textContent = 'تسجيل الدخول';
      return;
    }
    location.href = '06-dashboard.html';
  } catch(err){
    showFormMessage('formMsg','حدث خطأ غير متوقع: ' + err.message,true);
    btn.disabled = false; btn.textContent = 'تسجيل الدخول';
  }
}
</script>
</body></html>
