<script>
const CATEGORY_ICONS = {
  'أبقار': '<path d="M12 3l9 4v5c0 5-3.5 8-9 9-5.5-1-9-4-9-9V7z"/>',

};

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function daysAgo(dateStr){
  const diffMs = Date.now() - new Date(dateStr).getTime();
  const days = Math.max(0, Math.floor(diffMs / (1000*60*60*24)));
  return toArabicDigits(days);
}

// ================================================================
// 🔹 تحميل بيانات لوحة التحكم
// ================================================================
async function loadDashboard(){
  const user = await requireAuth();
  if(!user) return;

  // شارة الإشعارات غير المقروءة
  const { count: unreadCount } = await supabaseClient
    .from('notifications')
    .select('id', { count: 'exact', head: true })
    .eq('user_id', user.id)
    .eq('is_read', false);

  if (unreadCount && unreadCount > 0) {
    const topBadge = document.getElementById('notifBadgeTop');
    const navBadge = document.getElementById('notifBadgeNav');
    if (topBadge) topBadge.style.display = 'block';
    if (navBadge) navBadge.style.display = 'block';
  }

  // الملف الشخصي
  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('full_name, avatar_url')
    .eq('id', user.id)
    .maybeSingle();

  const displayName = (profile && profile.full_name) ? profile.full_name : 'مستخدم';
  document.getElementById('userName').textContent = displayName;
  const avatarBox = document.getElementById('userAvatar');
  if (profile && profile.avatar_url) {
    avatarBox.innerHTML = `<img src="${profile.avatar_url}" alt="">`;
  } else {
    avatarBox.textContent = displayName.trim().charAt(0) || '؟';
  }

  // الرصيد
  try{
    const { data: balanceRows, error: balError } = await supabaseClient
      .from('balances')
      .select('available_balance, locked_balance, total_earned')
      .eq('user_id', user.id)
      .order('available_balance', { ascending: false })
      .limit(1);

    if(balError) throw balError;

    const balance = balanceRows && balanceRows.length ? balanceRows[0] : null;
    const availableBalance = Number(balance ? balance.available_balance : 0) || 0;
    const lockedBalance = Number(balance ? balance.locked_balance : 0) || 0;
    const totalEarned = Number(balance ? balance.total_earned : 0) || 0;
    const totalValue = availableBalance + lockedBalance;

    document.getElementById('totalValue').textContent = formatMoney(totalValue) + ' $';
    document.getElementById('totalEarned').textContent = formatMoney(totalEarned) + ' $';
    document.getElementById('availableBalance').textContent = formatMoney(availableBalance) + ' $';
  } catch(balErr){
    console.error('balance section error:', balErr);
    document.getElementById('totalValue').textContent = '—';
  }

}

// ================================================================
// 🔹 الشريط المتحرك (Activity Feed) - يعرض جميع المستخدمين
// ================================================================
let feedItemsData = [];
let feedPosition = 0;
let feedSingleSetWidth = 0;
let feedRafHandle = null;
let feedLastTimestamp = null;
const FEED_SPEED_PX_PER_SEC = 45;

function renderFeedItem(r){
  const initial = (r.display_name || '؟').trim().charAt(0) || '؟';
  const avatar = r.avatar_url
    ? `<img src="${r.avatar_url}" alt="">`
    : initial;
  return `
    <div class="feed-item">
      <div class="feed-avatar">${avatar}</div>
      <div class="feed-phone">${escapeHtml(r.masked_phone || '')}</div>
      <div class="feed-label">${escapeHtml(r.label || '')}</div>
    </div>`;
}

function renderFeedTrack(){
  const track = document.getElementById('feedTrack');
  const strip = document.getElementById('feedStrip');
  
  if(!feedItemsData || feedItemsData.length === 0){
    strip.innerHTML = `<div class="feed-empty">لا توجد أنشطة حالياً</div>`;
    return;
  }

  // إعادة تعيين الـ strip لعرض المحتوى الطبيعي
  strip.innerHTML = `<div class="feed-track" id="feedTrack"></div>`;
  const newTrack = document.getElementById('feedTrack');

  const minRepeats = Math.max(2, Math.ceil(24 / feedItemsData.length));
  let oneSet = [];
  for(let i = 0; i < minRepeats; i++){
    oneSet = oneSet.concat(feedItemsData);
  }
  const oneSetHtml = oneSet.map(renderFeedItem).join('');
  newTrack.innerHTML = oneSetHtml + oneSetHtml;

  requestAnimationFrame(() => {
    const fullWidth = newTrack.scrollWidth;
    feedSingleSetWidth = fullWidth / 2;
    if (feedSingleSetWidth > 0 && feedPosition <= -feedSingleSetWidth) {
      feedPosition = feedPosition % feedSingleSetWidth;
    }
  });
}

function feedTick(timestamp){
  const track = document.getElementById('feedTrack');
  if (!track) {
    feedRafHandle = null;
    return;
  }
  
  if (feedLastTimestamp == null) feedLastTimestamp = timestamp;
  const dt = (timestamp - feedLastTimestamp) / 1000;
  feedLastTimestamp = timestamp;

  if (track && feedSingleSetWidth > 0) {
    feedPosition -= FEED_SPEED_PX_PER_SEC * dt;
    if (feedPosition <= -feedSingleSetWidth) {
      feedPosition += feedSingleSetWidth;
    }
    track.style.transform = `translateX(${feedPosition}px)`;
  }

  feedRafHandle = requestAnimationFrame(feedTick);
}

// ✅ تحميل الأنشطة - يعرض جميع المستخدمين (بدون استبعاد أي مستخدم)
async function loadActivityFeed(){
  try {
    // جلب جميع الأنشطة بدون استبعاد أي مستخدم
    const { data, error } = await supabaseClient
      .from('activity_feed')
      .select('display_name, masked_phone, avatar_url, amount, label')
      .order('created_at', { ascending: false })
      .limit(100);

    if (error) {
      console.error('activity feed error:', error);
      return;
    }

    const strip = document.getElementById('feedStrip');
    
    if (!data || data.length === 0) {
      strip.innerHTML = `<div class="feed-empty">لا توجد أنشطة حالياً</div>`;
      feedItemsData = [];
      return;
    }

    feedItemsData = data;
    renderFeedTrack();

    // بدء الحركة إذا لم تكن قيد التشغيل
    if (feedRafHandle == null) {
      feedRafHandle = requestAnimationFrame(feedTick);
    }
  } catch (err) {
    console.error('loadActivityFeed error:', err);
  }
}

// ================================================================
// 🔹 تشغيل كل شيء
// ================================================================
loadDashboard().catch(err => {
  document.getElementById('totalValue').textContent = '—';
  console.error(err);
});

// تحميل الشريط فوراً
loadActivityFeed();

// تحديث الشريط كل 15 ثانية
setInterval(loadActivityFeed, 15000);

// ================================================================
// 🔹 سلايدر الصور التعليمية (يتغير كل 4 ثواني)
// ================================================================
(function initPromoSlider(){
  const track = document.getElementById('promoTrack');
  const dotsWrap = document.getElementById('promoDots');
  if(!track || !dotsWrap) return;

  const slides = track.querySelectorAll('img');
  if(slides.length === 0) return;

  let promoIdx = 0;

  slides.forEach((_, i) => {
    const dot = document.createElement('span');
    if(i === 0) dot.classList.add('active');
    dot.addEventListener('click', () => goToPromo(i));
    dotsWrap.appendChild(dot);
  });
  const dots = dotsWrap.querySelectorAll('span');

  function goToPromo(i){
    promoIdx = i;
    track.style.transform = `translateX(-${promoIdx * 100}%)`;
    dots.forEach((d, j) => d.classList.toggle('active', j === promoIdx));
  }

  if(slides.length > 1){
    setInterval(() => {
      goToPromo((promoIdx + 1) % slides.length);
    }, 4000);
  }
})();

// ================================================================
// 🔹 زر تثبيت التطبيق (PWA Install)
// ================================================================
let deferredInstallPrompt = null;
const installBtn = document.getElementById('installAppBtn');

// المتصفح يرسل هذا الحدث فقط إذا التطبيق قابل للتثبيت وغير مثبت مسبقاً
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  if (installBtn) installBtn.style.display = 'flex';
});

if (installBtn) {
  installBtn.addEventListener('click', async () => {
    if (!deferredInstallPrompt) return;
    installBtn.style.display = 'none';
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
  });
}

// إخفاء الزر فور اكتمال التثبيت (أو إذا كان مثبت أصلاً)
window.addEventListener('appinstalled', () => {
  if (installBtn) installBtn.style.display = 'none';
  deferredInstallPrompt = null;
});

if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
  if (installBtn) installBtn.style.display = 'none';
}
</script>
