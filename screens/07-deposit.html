<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="color-scheme" content="dark"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>07 — إيداع</title><link rel="stylesheet" href="../assets/style.css?v=1784451053">
<style>
  <link rel="icon" href="../assets/icons/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/icons/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/apple-touch-icon.png">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#0D1623">
.net-row{display:flex;gap:10px;margin-bottom:20px;}
.net-btn{flex:1;text-align:center;padding:10px 0;border:1px solid var(--line);border-radius:12px;font-size:13px;color:var(--text-muted);}
.net-btn.active{border-color:var(--gold);color:var(--gold-soft);background:rgba(217,166,58,.08);}
.qr-box{background:#fff;width:150px;height:150px;border-radius:14px;margin:14px auto;display:flex;align-items:center;justify-content:center;}
.addr-box{background:var(--bg-surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;
  display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--gold-soft);direction:ltr;margin-bottom:20px;}
.warn{font-size:12px;color:var(--terracotta);text-align:center;line-height:1.8;margin-bottom:22px;}
.form-msg{display:none;font-size:13px;text-align:center;margin-bottom:14px;font-weight:600;}
</style></head>
<body><div class="device"><div class="statusbar"><span>٩:٤١</span><span>●●●</span></div>
<div class="screen">
  <div class="top-row"><a href="06-dashboard.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#F5F7FA" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a><div class="top-title">إيداع رصيد</div><div style="width:38px"></div></div>
  <div class="field-group"><label class="label">اختر الشبكة</label>
    <div class="net-row" id="netRow">
      <div class="net-btn active" data-net="TRC20">TRC20</div>
      <div class="net-btn" data-net="BEP20">BEP20</div>
      <div class="net-btn" data-net="ERC20">ERC20</div>
    </div></div>
  <div class="card" style="text-align:center;">
    <div class="card-sub" style="margin-bottom:6px;">أرسل USDT فقط عبر شبكة <span id="netLabel">TRC20</span> إلى العنوان أدناه</div>
    <div class="qr-box"><svg viewBox="0 0 100 100" width="120" height="120"><rect width="100" height="100" fill="#fff"/><g fill="#000"><rect x="8" y="8" width="20" height="20"/><rect x="72" y="8" width="20" height="20"/><rect x="8" y="72" width="20" height="20"/><rect x="36" y="20" width="6" height="6"/><rect x="48" y="30" width="6" height="6"/><rect x="60" y="44" width="6" height="6"/><rect x="30" y="50" width="6" height="6"/><rect x="44" y="60" width="6" height="6"/><rect x="56" y="70" width="6" height="6"/><rect x="70" y="55" width="6" height="6"/></g></svg></div>
    <div class="addr-box"><span id="walletAddress">TYu5e...3xe19f0a5aG9b0e3x4</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E8C170" stroke-width="1.8"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg></div>
  </div>
  <div class="field-group"><label class="label">المبلغ اللي حوّلته (USDT)</label>
    <div class="field"><input id="amount" type="number" min="1" step="0.01" placeholder="مثال: 100"/></div></div>
  <div class="field-group"><label class="label">هاش المعاملة TX Hash (اختياري)</label>
    <div class="field"><input id="txHash" type="text" placeholder="لصق هاش التحويل من المحفظة"/></div></div>
  <div id="formMsg" class="form-msg"></div>
  <div class="warn">إرسال أي عملة غير USDT أو عبر شبكة أخرى قد يؤدي لخسارة المبلغ نهائياً</div>
  <button id="submitBtn" class="cta outline" onclick="handleDeposit()">تم التحويل ← تسجيل الطلب</button>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
let selectedNetwork = 'TRC20';
document.getElementById('netRow').addEventListener('click', (e) => {
  const btn = e.target.closest('.net-btn');
  if(!btn) return;
  document.querySelectorAll('.net-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedNetwork = btn.dataset.net;
  document.getElementById('netLabel').textContent = selectedNetwork;
});

async function handleDeposit(){
  const user = await requireAuth();
  if(!user) return;

  const amount = parseFloat(document.getElementById('amount').value);
  const txHash = document.getElementById('txHash').value.trim();
  const walletAddress = document.getElementById('walletAddress').textContent.trim();
  const btn = document.getElementById('submitBtn');

  if(!amount || amount <= 0){
    showFormMessage('formMsg','الرجاء إدخال مبلغ صحيح',true); return;
  }

  btn.disabled = true; btn.textContent = 'جاري التسجيل...';

  const { error } = await supabaseClient.from('transactions').insert({
    user_id: user.id,
    type: 'deposit',
    amount: amount,
    status: 'pending',
    network: selectedNetwork,
    wallet_address: walletAddress,
    tx_hash: txHash || null
  });

  if(error){
    showFormMessage('formMsg','تعذر تسجيل الطلب: ' + error.message, true);
    btn.disabled = false; btn.textContent = 'تم التحويل ← تسجيل الطلب';
    return;
  }

  showFormMessage('formMsg','تم تسجيل طلب الإيداع، بانتظار المراجعة', false);
  setTimeout(() => { location.href = '13-history.html'; }, 900);
}
</script>
</body></html>
