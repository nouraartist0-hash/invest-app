<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="color-scheme" content="dark"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تأكيد السحب</title><link rel="stylesheet" href="../assets/style.css?v=1784451053">
<style>
.summary-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text-muted);padding:10px 0;border-bottom:1px dashed var(--line);}
.summary-row b{color:var(--cream);font-family:var(--font-display);}
.addr-box{background:var(--bg-surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:11.5px;color:var(--gold-soft);direction:ltr;margin:14px 0;word-break:break-all;}
.warn{font-size:12px;color:var(--terracotta);text-align:center;line-height:1.8;margin:18px 0;}
.form-msg{display:none;font-size:13px;text-align:center;margin-top:10px;font-weight:600;}
</style></head>
<body><div class="device"><div class="statusbar"><span>٩:٤١</span><span>●●●</span></div>
<div class="screen">
  <div class="top-row"><a href="08-withdraw.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#F5F7FA" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a><div class="top-title">تأكيد طلب السحب</div><div style="width:38px"></div></div>
  <div class="subtitle" style="margin-bottom:14px;">راجع تفاصيل الطلب جيداً قبل التأكيد — لا يمكن التراجع بعد الإرسال</div>
  <div class="card">
    <div class="summary-row"><span>الشبكة</span><b id="cNetwork">—</b></div>
    <div class="summary-row"><span>المبلغ المطلوب</span><b id="cAmount">—</b></div>
    <div class="summary-row"><span>رسوم الشبكة</span><b id="cFee">—</b></div>
    <div class="summary-row" style="border:none;"><span>المبلغ المستلم</span><b id="cReceived" style="color:#6FE3DC;">—</b></div>
  </div>
  <div class="addr-box" id="cAddress">—</div>
  <div class="warn">تأكد من صحة عنوان المحفظة والشبكة — الأموال المرسلة لعنوان أو شبكة خاطئة لا يمكن استرجاعها</div>
  <div id="formMsg" class="form-msg"></div>
  <div style="margin-top:auto;padding-bottom:26px;">
    <button id="confirmBtn" class="cta" onclick="handleConfirmWithdraw()">تأكيد وإرسال الطلب</button>
    <button class="cta outline" onclick="location.href='08-withdraw.html'">رجوع للتعديل</button>
  </div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
const pending = JSON.parse(sessionStorage.getItem('wd_pending') || 'null');
if(!pending){
  location.href = '08-withdraw.html';
}

if(pending){
  const received = Math.max(0, pending.amount - pending.fee);
  document.getElementById('cNetwork').textContent = (pending.network === 'TRC20' ? 'TRC20 - USDT' : 'BEP20 - USDT');
  document.getElementById('cAmount').textContent = formatMoney(pending.amount, false) + ' USDT';
  document.getElementById('cFee').textContent = pending.fee + ' USDT';
  document.getElementById('cReceived').textContent = formatMoney(received, false) + ' USDT';
  document.getElementById('cAddress').textContent = pending.walletAddress;
}

async function handleConfirmWithdraw(){
  const user = await requireAuth();
  if(!user || !pending) return;

  const btn = document.getElementById('confirmBtn');
  btn.disabled = true; btn.textContent = 'جاري إرسال الطلب...';

  const { error } = await supabaseClient.rpc('request_withdrawal', {
    p_amount: pending.amount,
    p_network: pending.network,
    p_wallet_address: pending.walletAddress
  });

  if(error){
    showFormMessage('formMsg','تعذر إرسال طلب السحب: ' + error.message, true);
    btn.disabled = false; btn.textContent = 'تأكيد وإرسال الطلب';
    return;
  }

  sessionStorage.removeItem('wd_pending');
  showFormMessage('formMsg','تم إرسال طلب السحب، بانتظار المراجعة', false);
  setTimeout(() => { location.href = '13-history.html'; }, 900);
}
</script>
</body></html>
