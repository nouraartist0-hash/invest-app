<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="color-scheme" content="dark"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>09 — السوق</title><link rel="stylesheet" href="../assets/style.css?v=1784451053">
<style>
.tabs{display:flex;gap:8px;margin-bottom:16px;}
.tab{flex:1;text-align:center;padding:10px 0;border-radius:var(--radius-pill);font-family:var(--font-display);font-weight:800;font-size:13.5px;border:1px solid var(--line);color:var(--text-muted);white-space:nowrap;}
.tab.active{background:var(--gold);color:#241A05;border-color:var(--gold);}
.offer{margin-bottom:14px;}
.tier-count-row{display:flex;justify-content:flex-end;margin-bottom:12px;}
.tier-count{background:var(--gold);color:#241A05;padding:5px 13px;border-radius:var(--radius-pill);font-size:11px;font-weight:700;white-space:nowrap;}
.tier-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tier-card{background:var(--bg-surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;position:relative;}
.tier-thumb-wrap{position:relative;height:100px;}
.tier-thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.tier-thumb-wrap .tier-badge{position:absolute;top:6px;left:6px;background:rgba(10,15,24,.75);border:1px solid var(--gold);color:var(--gold-soft);
  font-family:var(--font-display);font-weight:800;font-size:10.5px;padding:2px 7px;border-radius:6px;}
.tier-card-body{padding:10px;}
.tier-card-title{font-size:12px;color:var(--cream);font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tier-card-meta{font-size:10px;color:var(--text-muted);margin-bottom:3px;}
.tier-card-return{font-size:10.5px;color:var(--gold-soft);font-weight:700;margin-bottom:6px;}
.tier-progress{height:5px;background:var(--bg-deep);border-radius:3px;overflow:hidden;margin-bottom:4px;}
.tier-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-soft));}
.tier-funded{font-size:9.5px;color:var(--text-muted);margin-bottom:8px;}
.tier-detail-btn{display:block;text-align:center;padding:7px 0;border:1px solid var(--gold);border-radius:8px;font-size:10.5px;color:var(--gold-soft);font-weight:700;}
.range-badge{text-align:left;}
.disclaimer{font-size:11px;color:var(--text-muted);text-align:center;padding:6px 0 100px;line-height:1.8;}
</style></head>
<body><div class="device"><div class="statusbar"><span>٩:٤١</span><span>●●●</span></div>
<div class="screen">
  <div class="top-row" style="justify-content:flex-end;"><a href="06-dashboard.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#F5F7FA" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg></a></div>
  <div class="tabs"><div class="tab active" data-tier="VIP A">VIP A</div><div class="tab" data-tier="VIP B">VIP B</div><div class="tab" data-tier="VIP C">VIP C</div></div>

  <div class="tier-count-row"><div class="tier-count" id="tierCount">٠ عروض</div></div>
  <div id="offersList"><div style="text-align:center;color:var(--text-muted);font-size:13px;padding:30px 0;">جاري تحميل العروض...</div></div>

  <div class="disclaimer">النسب أعلاه تقديرية ومبنية على أداء دورات سابقة، وهي غير مضمونة وتتغير حسب الأداء الفعلي للقطيع والسوق</div>

  <div class="bottom-nav" style="position:absolute;bottom:0;left:0;right:0;">
    <a class="nav-item" href="06-dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10l9-7 9 7v10a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1z"/></svg>الرئيسية</a>
    <a class="nav-item active" href="09-marketplace.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3h18v18H3z"/><path d="M3 9h18M9 21V9"/></svg>السوق</a>
    <a class="nav-item" href="13b-my-investments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l3 6 6 1-4.5 4.5L18 20l-6-3-6 3 1.5-6.5L3 9l6-1z"/></svg>استثماراتي</a>
    <a class="nav-item" href="17b-rewards.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 12v9H4v-9M2 7h20v5H2V7zM12 22V7M12 7c-2 0-3-2-3-3.5A2.5 2.5 0 0112 3a2.5 2.5 0 013 3.5C15 8 14 7 12 7zM12 7c2 0 3-2 3-3.5A2.5 2.5 0 0012 1a2.5 2.5 0 00-3 3.5C9 8 10 7 12 7z"/></svg>الجوائز</a>
    <a class="nav-item" href="14-profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-6 8-6s8 2 8 6"/></svg>حسابي</a>
  </div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
let allOffers = [];

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

const TIER_ORDER = ['VIP A', 'VIP B', 'VIP C'];
const TIER_LETTER = { 'VIP A': 'A', 'VIP B': 'B', 'VIP C': 'C' };
const CROWN_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 18h20l-1.6-8.5-5 3.8L12 6l-3.4 7.3-5-3.8L2 18z"/><path d="M2 20h20"/></svg>';

function renderTierCard(o, letter, num){
  const funded = o.funding_percent != null ? o.funding_percent : 0;
  const thumb = o.image_url
    ? `<img src="${escapeAttr(o.image_url)}" alt="">`
    : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg-deep);"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#E8C170" stroke-width="1.6"><path d="M12 3l9 4v5c0 5-3.5 8-9 9-5.5-1-9-4-9-9V7z"/></svg></div>`;
  return `
  <a class="tier-card" href="10-offer-details.html?id=${o.id}">
    <div class="tier-thumb-wrap">${thumb}<span class="tier-badge">${letter}${num}</span></div>
    <div class="tier-card-body">
      <div class="tier-card-title">${escapeAttr(o.title)}</div>
      <div class="tier-card-meta">مدة الدورة: ${toArabicDigits(o.duration_days)} يوم</div>
      <div class="tier-card-meta">الحد الأدنى: ${o.min_amount}$</div>
      <div class="tier-card-return">${o.min_return}–${o.max_return}% تقديري/شهرياً</div>
      <div class="tier-progress"><div class="tier-progress-fill" style="width:${funded}%;"></div></div>
      <div class="tier-funded">تم تمويل ${toArabicDigits(funded)}%</div>
      <div class="tier-detail-btn">عرض التفاصيل</div>
    </div>
  </a>`;
}

function renderOffers(tier){
  const list = document.getElementById('offersList');
  const filtered = allOffers.filter(o => (TIER_ORDER.includes(o.tier) ? o.tier : 'VIP A') === tier);

  document.getElementById('tierCount').textContent = `${toArabicDigits(filtered.length)} عروض`;

  if(filtered.length === 0){
    list.innerHTML = `<div style="text-align:center;color:var(--text-muted);font-size:13px;padding:30px 0;">ما فيه عروض متاحة حالياً ضمن ${tier}</div>`;
    return;
  }

  const letter = TIER_LETTER[tier];
  const cards = filtered.map((o, i) => renderTierCard(o, letter, i + 1)).join('');
  list.innerHTML = `<div class="tier-grid">${cards}</div>`;
}

async function loadOffers(){
  const user = await requireAuth();
  if(!user) return;

  const { data, error } = await supabaseClient
    .from('offers')
    .select('id, title, category, min_return, max_return, duration_days, min_amount, funding_percent, image_url, tier')
    .eq('status', 'active')
    .order('created_at', { ascending: false });

  if(error){
    document.getElementById('offersList').innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:13px;padding:30px 0;">تعذر تحميل العروض</div>';
    return;
  }

  allOffers = data || [];
  renderOffers('VIP A');
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderOffers(tab.dataset.tier);
  });
});

loadOffers();
</script>
</body></html>
