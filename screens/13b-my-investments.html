.inv-card{display:flex;gap:12px;padding:14px;margin-bottom:12px;}
.inv-thumb{width:52px;height:52px;border-radius:12px;object-fit:cover;flex-shrink:0;border:1px solid var(--line);}
.inv-icon{width:52px;height:52px;border-radius:12px;background:var(--bg-surface);border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.inv-icon svg{width:24px;height:24px;}
.inv-info{flex:1;min-width:0;}
.inv-title{font-size:13.5px;color:var(--cream);font-weight:600;margin-bottom:4px;}
.inv-date{font-size:11.5px;color:var(--text-muted);margin-bottom:6px;}
.inv-foot{display:flex;justify-content:space-between;align-items:center;}
.inv-amount{font-family:var(--font-display);font-weight:800;font-size:14px;color:var(--gold-soft);direction:ltr;}
.inv-deed{font-size:10.5px;color:var(--text-muted);}
.empty-wrap{text-align:center;padding:60px 20px 30px;}
.empty-icon{width:72px;height:72px;border-radius:50%;background:var(--bg-surface);border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.empty-icon svg{width:32px;height:32px;}
.empty-title{font-family:var(--font-display);font-weight:700;font-size:15.5px;color:var(--cream);margin-bottom:8px;}
.empty-sub{font-size:12.5px;color:var(--text-muted);line-height:1.9;margin-bottom:22px;}
</style></head>
<body><div class="device"><div class="statusbar"><span>٩:٤١</span><span>●●●</span></div>
<div class="screen">

  <div id="invList"><div style="text-align:center;color:var(--text-muted);font-size:13px;padding:30px 0;">جاري التحميل...</div></div>

  </div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
const STATUS_META = {
  active: { label: 'فعّال', cls: 'success' },
  closed: { label: 'مكتمل', cls: '' }
};

const ARABIC_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

function formatFullDate(iso){
  const d = new Date(iso);
  return `${toArabicDigits(d.getDate())} ${ARABIC_MONTHS[d.getMonth()]} ${toArabicDigits(d.getFullYear())}`;
}

function renderEmptyState(){
  document.getElementById('invList').innerHTML = `
    <div class="empty-wrap">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#E8C170" stroke-width="1.6"><path d="M12 3l9 4v5c0 5-3.5 8-9 9-5.5-1-9-4-9-9V7z"/></svg></div>
      <div class="empty-title">لسا ما بديت رحلتك الاستثمارية</div>
      <div class="empty-sub">كل استثماراتك بيّه ح تظهر بهذا المكان — تصفح السوق وابدأ أول مشاركة إلك بقطيع حقيقي</div>
      <a class="cta" style="display:inline-block;padding:12px 28px;" href="09-marketplace.html">تصفح السوق الآن</a>
    </div>`;
}

function renderInvestments(list){
  document.getElementById('invList').innerHTML = list.map((inv, idx) => {
    const offer = inv.offers || {};
    const cardClass = idx % 2 === 0 ? 'deed-card inv-card' : 'card inv-card';
    const status = STATUS_META[inv.status] || { label: inv.status, cls: '' };
    const thumb = offer.image_url
      ? `<img class="inv-thumb" src="${escapeAttr(offer.image_url)}" alt="">`
      : `<div class="inv-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#E8C170" stroke-width="1.6"><path d="M12 3l9 4v5c0 5-3.5 8-9 9-5.5-1-9-4-9-9V7z"/></svg></div>`;
    return `
    <a class="${cardClass}" href="10-offer-details.html?id=${inv.offer_id}">
      ${thumb}
      <div class="inv-info">
        <div class="inv-title">${escapeAttr(offer.title || 'حصة استثمارية')}</div>
        <div class="inv-date">تاريخ الشراء: ${formatFullDate(inv.started_at)}</div>
        <div class="inv-foot">
          <span class="inv-amount">${formatMoney(inv.amount, false)}$</span>
          <span class="chip ${status.cls}">${status.label}</span>
        </div>
        <div class="inv-deed">وثيقة ملكية #${inv.deed_number || '—'}</div>
      </div>
    </a>`;
  }).join('');
}

async function loadInvestments(){
  const user = await requireAuth();
  if(!user) return;

  const { data, error } = await supabaseClient
    .from('investments')
    .select('id, offer_id, amount, started_at, deed_number, status, offers(title, image_url)')
    .eq('user_id', user.id)
    .order('started_at', { ascending: false });

  if(error){
    document.getElementById('invList').innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:13px;padding:30px 0;">تعذر تحميل استثماراتك</div>';
    return;
  }

  if(!data || data.length === 0){
    renderEmptyState();
    return;
  }

  renderInvestments(data);
}

loadInvestments();
</script>
