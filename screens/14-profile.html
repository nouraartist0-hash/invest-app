<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
async function handleLogout(){
  await supabaseClient.auth.signOut();
  location.href = '02-login.html';
}

(async function(){
  const user = await requireAuth();
  if (!user) return;

  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('full_name, phone, kyc_status')
    .eq('id', user.id)
    .maybeSingle();

  const displayName = (profile && profile.full_name) ? profile.full_name : 'مستخدم';
  document.getElementById('profileName').textContent = displayName;
  document.getElementById('avatarInitial').textContent = displayName.trim().charAt(0) || '؟';
  document.getElementById('profilePhone').textContent = (profile && profile.phone) ? profile.phone : (user.email || '');

  const kycChip = document.getElementById('kycChip');
  const status = profile && profile.kyc_status;
  if (status === 'verified' || status === 'approved') {
    kycChip.textContent = '✓ الهوية موثّقة';
    kycChip.classList.add('success');
    kycChip.style.display = '';
  } else if (status === 'pending') {
    kycChip.textContent = 'الهوية قيد المراجعة';
    kycChip.style.display = '';
  } else {
    kycChip.textContent = 'الهوية غير موثّقة';
    kycChip.style.display = '';
  }
})();
</script>
