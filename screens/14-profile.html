<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
async function handleLogout(){
  await supabaseClient.auth.signOut();
  location.href = '02-login.html';
}

const AVATAR_BUCKET = 'avatars';
let currentUser = null;

function renderAvatar(url, displayName){
  const box = document.getElementById('avatarBox');
  if (url) {
    box.innerHTML = `<img src="${url}" alt="">`;
  } else {
    box.innerHTML = `<span id="avatarInitial">${(displayName || '؟').trim().charAt(0) || '؟'}</span>`;
  }
}

async function handleAvatarChange(input){
  const file = input.files && input.files[0];
  if (!file || !currentUser) return;

  if (!file.type.startsWith('image/')) {
    alert('الرجاء اختيار ملف صورة');
    return;
  }
  if (file.size > 5 * 1024 * 1024) {
    alert('حجم الصورة كبير، الحد الأقصى ٥ ميجابايت');
    return;
  }

  const badge = document.querySelector('.avatar-edit-badge');
  badge.style.opacity = '0.5';

  try {
    const ext = file.name.split('.').pop();
    const path = `${currentUser.id}/${Date.now()}.${ext}`;

    const { error: uploadError } = await supabaseClient.storage
      .from(AVATAR_BUCKET)
      .upload(path, file, { upsert: true });
    if (uploadError) throw uploadError;

    const { data: publicUrlData } = supabaseClient.storage.from(AVATAR_BUCKET).getPublicUrl(path);
    const avatarUrl = publicUrlData.publicUrl;

    const { error: updateError } = await supabaseClient
      .from('profiles')
      .update({ avatar_url: avatarUrl })
      .eq('id', currentUser.id);
    if (updateError) throw updateError;

    renderAvatar(avatarUrl, document.getElementById('profileName').textContent);
  } catch (err) {
    alert('تعذر رفع الصورة: ' + err.message);
  } finally {
    badge.style.opacity = '';
    input.value = '';
  }
}

(async function(){
  const user = await requireAuth();
  if (!user) return;
  currentUser = user;

  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('full_name, phone, kyc_status, avatar_url')
    .eq('id', user.id)
    .maybeSingle();

  const displayName = (profile && profile.full_name) ? profile.full_name : 'مستخدم';
  document.getElementById('profileName').textContent = displayName;
  renderAvatar(profile && profile.avatar_url, displayName);
  document.getElementById('profilePhone').textContent = (profile && profile.phone) ? profile.phone : (user.email || '');

  const kycChip = document.getElementById('kycChip');
  const status = profile && profile.kyc_status;
  if (status === 'verified' || status === 'approved') {
    kycChip.textContent = '✓ الهوية موثّقة';
    kycChip.classList.add('success');
    kycChip.style.display = '';
  } else if (status === 'pending') {
    kycChip.textContent = 'الهوية قيد المراجعة';
    kycChip.style.display = '';
  } else {
    kycChip.textContent = 'الهوية غير موثّقة';
    kycChip.style.display = '';
  }
})();
</script>
