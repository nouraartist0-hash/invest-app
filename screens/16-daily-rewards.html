<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="color-scheme" content="dark"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>16 — المكافآت اليومية</title><link rel="stylesheet" href="../assets/style.css?v=1784451053">
<style>
.reward-hero{background:linear-gradient(135deg,#3A2E12,#2A2117);border:1px solid var(--gold);border-radius:var(--radius-card);
  padding:22px;text-align:center;margin-bottom:18px;}
.reward-icon{width:56px;height:56px;margin:0 auto 12px;}
.reward-amount{font-family:var(--font-display);font-weight:900;font-size:24px;color:var(--gold-soft);}
.timer{font-family:var(--font-display);font-size:15px;color:var(--cream);margin-top:10px;letter-spacing:2px;direction:ltr;}
.streak-row{display:flex;justify-content:space-between;gap:6px;margin-bottom:20px;}
.day{flex:1;text-align:center;padding:10px 4px;border-radius:10px;background:var(--bg-surface);border:1px solid var(--line);font-size:11px;color:var(--text-muted);}
.day.done{border-color:var(--success);color:#8FC98D;}
.day.today{border-color:var(--gold);color:var(--gold-soft);}
</style></head>
<body><div class="device"><div class="statusbar"><span>٩:٤١</span><span>●●●</span></div>
<div class="screen">
  <div class="top-row"><a href="06-dashboard.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#F3EEDD" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a><div class="top-title">المكافآت اليومية</div><div style="width:38px"></div></div>

  <div class="reward-hero">
    <svg class="reward-icon" viewBox="0 0 48 48" fill="none" stroke="#E4C766" stroke-width="1.5"><rect x="8" y="18" width="32" height="22" rx="3"/><path d="M8 26h32M24 18v22M16 18c0-5 3-8 8-8s8 3 8 8"/></svg>
    <div class="card-sub">مكافأة تسجيل الدخول اليومي</div>
    <div class="reward-amount">0.50 $</div>
    <div class="timer">المكافأة القادمة خلال 06:12:45</div>
  </div>

  <div class="section-title" style="margin-bottom:10px;">سلسلة أيامك</div>
  <div class="streak-row">
    <div class="day done">١<br>✓</div><div class="day done">٢<br>✓</div><div class="day done">٣<br>✓</div>
    <div class="day today">٤<br>اليوم</div><div class="day">٥</div><div class="day">٦</div><div class="day">٧</div>
  </div>

  <div class="card-sub" style="text-align:center;line-height:1.9;margin-bottom:110px;">مكافأة رمزية لتشجيع المتابعة اليومية لأداء قطعانك — لا ترتبط بأي عائد استثماري</div>

  <button class="cta" style="position:absolute;bottom:26px;left:22px;right:22px;">استلام المكافأة</button>
</div></div></body></html>
