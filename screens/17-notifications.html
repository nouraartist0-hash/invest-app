<title>17 — الإشعارات</title><link rel="stylesheet" href="../assets/style.css?v=1784451053">
<style>
.notif{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
.n-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.n-icon.ok{background:rgba(24,199,192,.15);}
.n-icon.warn{background:rgba(225,90,90,.15);}
.n-icon.bad{background:rgba(225,90,90,.22);}
.n-icon svg{width:16px;height:16px;}
.n-info{flex:1;}
.n-title{font-size:13.5px;color:var(--cream);}
.n-time{font-size:11px;color:var(--text-muted);margin-top:2px;}
.empty-state{text-align:center;color:var(--text-muted);font-size:13px;padding:50px 0;}
</style></head>
<body><div class="device"><div class="statusbar"><span>٩:٤١</span><span>●●●</span></div>
<div class="screen">
  <div class="top-row"><a href="06-dashboard.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#F5F7FA" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a><div class="top-title">الإشعارات</div><div style="width:38px"></div></div>

  <div id="notifList"><div class="empty-state">جاري التحميل...</div></div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

// أيقونة لكل نوع عملية (نفس منطق شاشة سجل العمليات)
const TYPE_ICON = {
  deposit:        '<path d="M12 5v14M5 12l7-7 7 7"/>',
  withdraw:       '<path d="M12 19V5M5 12l7 7 7-7"/>',
  investment:     '<path d="M12 3l9 4v5c0 5-3.5 8-9 9-5.5-1-9-4-9-9V7z"/>',
  investment_return: '<path d="M12 3l9 4v5c0 5-3.5 8-9 9-5.5-1-9-4-9-9V7z"/>',
  profit:         '<path d="M12 5v14M5 12l7-7 7 7"/>',
  referral_bonus: '<circle cx="9" cy="8" r="3"/><path d="M2 21c0-3.5 3-5 7-5s7 1.5 7 5"/>',
  kyc_approved:   '<path d="M20 6L9 17l-5-5"/>',
  kyc_rejected:   '<path d="M18 6L6 18M6 6l12 12"/>',
  support_message:'<path d="M21 11.5a8.38 8.38 0 01-8.5 8.5 8.5 8.5 0 01-4-1L3 20l1-4.5A8.38 8.38 0 012 12a8.5 8.5 0 018.5-8.5A8.38 8.38 0 0121 11.5z"/>',
  reward:         '<circle cx="12" cy="12" r="9"/><path d="M12 3v9l6 3"/><circle cx="12" cy="12" r="1.2"/>'
};

// نص الإشعار حسب النوع والحالة
function buildTitle(t){
  const amt = formatMoney(t.amount, false);
  if (t.type === 'deposit') {
    return t.status === 'completed' ? `تم إيداع ${amt}$ بنجاح` : `طلب إيداع ${amt}$ قيد المراجعة`;
  }
  if (t.type === 'withdraw') {
    if (t.status === 'completed') return `تم تنفيذ سحب ${amt}$ بنجاح`;
    if (t.status === 'rejected') return `تم رفض طلب سحب ${amt}$`;
    if (t.status === 'cancelled') return `تم إلغاء طلب سحب ${amt}$`;
    return `طلب سحب ${amt}$ قيد المراجعة`;
  }
  if (t.type === 'investment') return `تمت مشاركتك الاستثمارية بمبلغ ${amt}$`;
  if (t.type === 'investment_return') return `تم استرجاع رأس مال دورة مغلقة بمبلغ ${amt}$`;
  if (t.type === 'profit') return `استلمت عائد استثماري ${amt}$`;
  if (t.type === 'referral_bonus') return `استلمت مكافأة إحالة ${amt}$`;
  return `عملية بمبلغ ${amt}$`;
}

// لون/حالة الأيقونة
function statusClass(status){
  if (status === 'completed') return 'ok';
  if (status === 'rejected' || status === 'cancelled') return 'bad';
  return 'warn'; // pending
}
function statusColor(status){
  if (status === 'completed') return '#6FE3DC';
  if (status === 'rejected' || status === 'cancelled') return '#F2A0A0';
  return '#F2A0A0';
}

function timeAgo(iso){
  const diffSec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (diffSec < 60) return 'الآن';
  const diffMin = Math.floor(diffSec / 60);
  if (diffMin < 60) return `منذ ${toArabicDigits(diffMin)} دقيقة`;
  const diffHour = Math.floor(diffMin / 60);
  if (diffHour < 24) return `منذ ${toArabicDigits(diffHour)} ساعة`;
  const diffDay = Math.floor(diffHour / 24);
  if (diffDay < 30) return `منذ ${toArabicDigits(diffDay)} يوم`;
  const diffMonth = Math.floor(diffDay / 30);
  return `منذ ${toArabicDigits(diffMonth)} شهر`;
}

async function loadNotifications(){
  const user = await requireAuth();
  if(!user) return;

  const [txRes, notifRes] = await Promise.all([
    supabaseClient.from('transactions')
      .select('id, type, amount, status, created_at')
      .eq('user_id', user.id)
      .order('created_at', { ascending: false })
      .limit(30),
    supabaseClient.from('notifications')
      .select('id, title, type, created_at')
      .eq('user_id', user.id)
      .order('created_at', { ascending: false })
      .limit(30)
  ]);

  const list = document.getElementById('notifList');

  if (txRes.error && notifRes.error) {
    list.innerHTML = `<div class="empty-state">تعذر تحميل الإشعارات: ${escapeHtml(txRes.error.message)}</div>`;
    return;
  }

  // نوحّد الاثنين بشكل عنصر واحد: { title, type, status, created_at }
  const txItems = (txRes.data || []).map(t => ({
    kind: 'tx',
    type: t.type,
    status: t.status,
    title: buildTitle(t),
    created_at: t.created_at
  }));

  const notifItems = (notifRes.data || []).map(n => ({
    kind: 'notif',
    type: n.type,
    status: n.type === 'kyc_rejected' ? 'rejected' : 'completed',
    title: n.title,
    created_at: n.created_at
  }));

  const merged = [...txItems, ...notifItems]
    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
    .slice(0, 40);

  // نعلّم كل الإشعارات كمقروءة أول ما المستخدم يفتح هذي الصفحة (عشان النقطة الحمرة تختفي)
  supabaseClient.from('notifications')
    .update({ is_read: true })
    .eq('user_id', user.id)
    .eq('is_read', false)
    .then(() => {});

  if (merged.length === 0) {
    list.innerHTML = `<div class="empty-state">ماكو إشعارات حالياً</div>`;
    return;
  }

  list.innerHTML = merged.map(n => `
    <div class="notif">
      <div class="n-icon ${statusClass(n.status)}">
        <svg viewBox="0 0 24 24" fill="none" stroke="${statusColor(n.status)}" stroke-width="2">${TYPE_ICON[n.type] || TYPE_ICON.deposit}</svg>
      </div>
      <div class="n-info">
        <div class="n-title">${escapeHtml(n.title)}</div>
        <div class="n-time">${timeAgo(n.created_at)}</div>
      </div>
    </div>
  `).join('');
}

loadNotifications();
</script>
</body></html>
