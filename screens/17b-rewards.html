<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
function fmtHMS(totalSeconds){
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = Math.floor(totalSeconds % 60);
  return [h,m,s].map(n => String(n).padStart(2,'0')).join(':');
}

async function loadVaultStatus(){
  const el = document.getElementById('vaultStatus');
  const { data, error } = await supabaseClient.rpc('get_vault_status');
  if(error){ el.textContent = 'اضغط للدخول'; return; }
  if(data.allowed){
    el.textContent = '✅ متاحة الآن — جرّب حظك';
    el.classList.add('ready');
  }else{
    el.textContent = `⏳ متاحة بعد ${toArabicDigits(fmtHMS(data.seconds_remaining))}`;
  }
}

async function loadWheelStatus(){
  const el = document.getElementById('wheelStatus');
  const { data, error } = await supabaseClient.rpc('get_wheel_status');
  if(error){ el.textContent = 'اضغط للدخول'; return; }
  if(data.allowed){
    el.textContent = '✅ متاحة الآن — أدر العجلة';
    el.classList.add('ready');
  }else{
    el.textContent = `⏳ متاحة بعد ${toArabicDigits(fmtHMS(data.seconds_remaining))}`;
  }
}

async function init(){
  const user = await requireAuth();
  if(!user) return;
  loadVaultStatus();
  loadWheelStatus();
}
init();
</script>
