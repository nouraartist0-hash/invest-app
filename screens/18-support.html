<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="color-scheme" content="dark"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>18 — الدعم</title><link rel="stylesheet" href="../assets/style.css?v=1784451053">
<style>
.msg{max-width:75%;padding:12px 14px;border-radius:16px;font-size:13.5px;line-height:1.7;margin-bottom:10px;}
.msg.in{background:var(--bg-surface);border:1px solid var(--line);color:var(--cream);align-self:flex-start;border-bottom-right-radius:4px;}
.msg.out{background:var(--gold);color:#1C1500;align-self:flex-end;margin-right:auto;border-bottom-left-radius:4px;}
.msg-time{font-size:10px;color:var(--text-muted);margin-top:3px;}
.chat-area{display:flex;flex-direction:column;flex:1;overflow-y:auto;padding-bottom:10px;}
.input-bar{display:flex;gap:10px;align-items:center;padding:12px 0 26px;}
.input-bar input{flex:1;background:var(--bg-surface);border:1px solid var(--line);border-radius:var(--radius-pill);
  padding:12px 16px;color:var(--cream);font-family:var(--font-body);outline:none;}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
</style></head>
<body><div class="device"><div class="statusbar"><span>٩:٤١</span><span>●●●</span></div>
<div class="screen">
  <div class="top-row"><a href="14-profile.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#F3EEDD" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a><div class="top-title">الدعم والمراسلة</div><div style="width:38px"></div></div>
  <div class="chat-area">
    <div class="msg in">مرحباً! كيف يمكننا مساعدتك؟<div class="msg-time">08:30</div></div>
    <div class="msg out">أريد أعرف عن السحب<div class="msg-time">08:31</div></div>
    <div class="msg in">يتم مراجعة طلبات السحب خلال 24 ساعة، وتصل مباشرة لمحفظتك بعد الموافقة<div class="msg-time">08:32</div></div>
  </div>
  <div class="input-bar">
    <div class="send-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1C1500" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></div>
    <input type="text" placeholder="اكتب رسالتك..."/>
  </div>
</div></div></body></html>
