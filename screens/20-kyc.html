<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="color-scheme" content="dark"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/favicon.ico" sizes="any">
<link rel="icon" href="../assets/icons/favicon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="../assets/icons/favicon-16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
<meta name="theme-color" content="#0D1623">

<title>20 — توثيق الهوية</title><link rel="stylesheet" href="../assets/style.css?v=1784451053">
<style>
.step-row{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--line);}
.step-num{width:30px;height:30px;border-radius:50%;background:var(--bg-surface);border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--text-muted);flex-shrink:0;}
.step-num.done{background:var(--success);border-color:var(--success);color:#fff;}
.step-num.current{border-color:var(--gold);color:var(--gold-soft);}
.step-info{flex:1;}
.step-title{font-size:14px;color:var(--cream);font-weight:500;}
.step-sub{font-size:11.5px;color:var(--text-muted);margin-top:2px;}
.doc-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);}
.doc-info{flex:1;}
.doc-title{font-size:14px;color:var(--cream);font-weight:500;}
.doc-status{font-size:11.5px;margin-top:2px;}
.doc-status.pending{color:var(--gold-soft);}
.doc-status.approved{color:var(--success);}
.doc-status.rejected{color:var(--terracotta);}
.doc-status.none{color:var(--text-muted);}
.doc-btn{background:var(--bg-surface);border:1px solid var(--line);border-radius:var(--radius-pill);padding:8px 16px;font-size:12.5px;color:var(--gold-soft);flex-shrink:0;}
</style></head>
<body><div class="device"><div class="statusbar"><span>٩:٤١</span><span>●●●</span></div>
<div class="screen">
  <div class="top-row"><a href="14-profile.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#F5F7FA" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a><div class="top-title">توثيق الهوية (KYC)</div><div style="width:38px"></div></div>
  <div class="subtitle" style="margin-bottom:10px;">التوثيق مطلوب لرفع حدود السحب وحماية حسابك</div>

  <div class="step-row"><div class="step-num done">✓</div><div class="step-info"><div class="step-title">المعلومات الشخصية</div><div class="step-sub">مكتمل</div></div></div>
  <div class="step-row"><div class="step-num" id="step2Num">2</div><div class="step-info"><div class="step-title">رفع المستندات</div><div class="step-sub">صورة الهوية (وجهين) + صورة شخصية</div></div></div>
  <div class="step-row"><div class="step-num" id="step3Num">3</div><div class="step-info"><div class="step-title">التحقق</div><div class="step-sub" id="step3Sub">مراجعة خلال 24–48 ساعة</div></div></div>

  <div class="doc-row">
    <div class="doc-info">
      <div class="doc-title">صورة الهوية (الوجه الأمامي)</div>
      <div class="doc-status none" id="idDocFrontStatus">لم تُرفع بعد</div>
    </div>
    <button class="doc-btn" id="idDocFrontBtn" onclick="document.getElementById('idDocFrontInput').click()">رفع</button>
    <input type="file" id="idDocFrontInput" accept="image/*" style="display:none;" onchange="handleDocUpload(this,'id_document_front','idDocFrontStatus')"/>
  </div>

  <div class="doc-row">
    <div class="doc-info">
      <div class="doc-title">صورة الهوية (الوجه الخلفي)</div>
      <div class="doc-status none" id="idDocBackStatus">لم تُرفع بعد</div>
    </div>
    <button class="doc-btn" id="idDocBackBtn" onclick="document.getElementById('idDocBackInput').click()">رفع</button>
    <input type="file" id="idDocBackInput" accept="image/*" style="display:none;" onchange="handleDocUpload(this,'id_document_back','idDocBackStatus')"/>
  </div>

  <div class="doc-row">
    <div class="doc-info">
      <div class="doc-title">صورة شخصية (سيلفي)</div>
      <div class="doc-status none" id="selfieDocStatus">لم تُرفع بعد</div>
    </div>
    <button class="doc-btn" id="selfieDocBtn" onclick="document.getElementById('selfieDocInput').click()">رفع</button>
    <input type="file" id="selfieDocInput" accept="image/*" capture="user" style="display:none;" onchange="handleDocUpload(this,'selfie','selfieDocStatus')"/>
  </div>

  <div id="kycMsg" class="form-msg" style="margin-top:14px;"></div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
const KYC_BUCKET = 'kyc-documents';
let currentUser = null;

const STATUS_LABELS = {
  pending: { text: 'قيد المراجعة', cls: 'pending' },
  approved: { text: '✓ موثّقة', cls: 'approved' },
  verified: { text: '✓ موثّقة', cls: 'approved' },
  rejected: { text: 'مرفوضة، أعد الرفع', cls: 'rejected' }
};

function renderDocStatus(elId, status){
  const el = document.getElementById(elId);
  if (!status) {
    el.textContent = 'لم تُرفع بعد';
    el.className = 'doc-status none';
    return;
  }
  const info = STATUS_LABELS[status] || { text: status, cls: 'pending' };
  el.textContent = info.text;
  el.className = 'doc-status ' + info.cls;
}

async function handleDocUpload(input, documentType, statusElId){
  const file = input.files && input.files[0];
  if (!file || !currentUser) return;

  if (!file.type.startsWith('image/')) {
    showFormMessage('kycMsg', 'الرجاء اختيار ملف صورة', true);
    return;
  }
  if (file.size > 8 * 1024 * 1024) {
    showFormMessage('kycMsg', 'حجم الصورة كبير، الحد الأقصى ٨ ميجابايت', true);
    return;
  }

  try {
    const ext = file.name.split('.').pop();
    const path = `${currentUser.id}/${documentType}_${Date.now()}.${ext}`;

    const { error: uploadError } = await supabaseClient.storage
      .from(KYC_BUCKET)
      .upload(path, file, { upsert: true });
    if (uploadError) throw uploadError;

    const { data: publicUrlData } = supabaseClient.storage.from(KYC_BUCKET).getPublicUrl(path);

    const { error: insertError } = await supabaseClient
      .from('kyc_documents')
      .insert({
        user_id: currentUser.id,
        document_type: documentType,
        file_url: publicUrlData.publicUrl,
        status: 'pending',
        submitted_at: new Date().toISOString()
      });
    if (insertError) throw insertError;

    renderDocStatus(statusElId, 'pending');
    showFormMessage('kycMsg', 'تم رفع المستند بنجاح', false);
    await refreshOverallStatus();
  } catch (err) {
    showFormMessage('kycMsg', 'تعذر رفع المستند: ' + err.message, true);
  } finally {
    input.value = '';
  }
}

async function refreshOverallStatus(){
  const { data: docs } = await supabaseClient
    .from('kyc_documents')
    .select('document_type, status, submitted_at')
    .eq('user_id', currentUser.id)
    .order('submitted_at', { ascending: false });

  const latestByType = {};
  (docs || []).forEach(d => {
    if (!latestByType[d.document_type]) latestByType[d.document_type] = d.status;
  });

  renderDocStatus('idDocFrontStatus', latestByType['id_document_front'] || null);
  renderDocStatus('idDocBackStatus', latestByType['id_document_back'] || null);
  renderDocStatus('selfieDocStatus', latestByType['selfie'] || null);

  // نخفي زر "رفع" لأي مستند صار موثّق (approved) عشان ما يعيد رفعه بلا داعي
  const BTN_BY_TYPE = { id_document_front: 'idDocFrontBtn', id_document_back: 'idDocBackBtn', selfie: 'selfieDocBtn' };
  Object.keys(BTN_BY_TYPE).forEach(type => {
    const btn = document.getElementById(BTN_BY_TYPE[type]);
    if (btn) btn.style.display = (latestByType[type] === 'approved') ? 'none' : '';
  });

  const bothSubmitted = latestByType['id_document_front'] && latestByType['id_document_back'] && latestByType['selfie'];
  const step2 = document.getElementById('step2Num');
  const step3 = document.getElementById('step3Num');
  const step3Sub = document.getElementById('step3Sub');

  if (bothSubmitted) {
    step2.textContent = '✓'; step2.className = 'step-num done';

    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('kyc_status')
      .eq('id', currentUser.id)
      .maybeSingle();

    if (profile && profile.kyc_status === 'approved') {
      step3.textContent = '✓'; step3.className = 'step-num done';
      if (step3Sub) step3Sub.textContent = 'تم التوثيق بنجاح';
    } else if (profile && profile.kyc_status === 'rejected') {
      step3.textContent = '!'; step3.className = 'step-num current';
      if (step3Sub) step3Sub.textContent = 'تم رفض أحد المستندات، أعد الرفع';
    } else {
      step3.className = 'step-num current';
      if (step3Sub) step3Sub.textContent = 'مراجعة خلال 24–48 ساعة';
      if (!profile || profile.kyc_status !== 'approved') {
        await supabaseClient.from('profiles').update({ kyc_status: 'pending' }).eq('id', currentUser.id);
      }
    }
  } else {
    step2.textContent = '2'; step2.className = 'step-num current';
    step3.className = 'step-num';
    if (step3Sub) step3Sub.textContent = 'مراجعة خلال 24–48 ساعة';
  }
}

(async function(){
  const user = await requireAuth();
  if (!user) return;
  currentUser = user;
  await refreshOverallStatus();
})();
</script>
</body></html>
