<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="color-scheme" content="dark"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/favicon.ico" sizes="any">
<link rel="icon" href="../assets/icons/favicon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="../assets/icons/favicon-16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
<meta name="theme-color" content="#0D1623">

<title>طلبات القيادة</title><link rel="stylesheet" href="../assets/style.css?v=1784451053">
<style>
.tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;}
.tab{padding:8px 16px;border-radius:var(--radius-pill);font-size:12.5px;border:1px solid var(--line);color:var(--text-muted);white-space:nowrap;}
.tab.active{background:var(--gold);color:#241A05;border-color:var(--gold);font-weight:700;}
.req-card{background:var(--bg-surface);border:1px solid var(--line);border-radius:var(--radius-card);padding:16px;margin-bottom:12px;}
.req-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.req-name{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--cream);}
.req-phone{font-size:11.5px;color:var(--text-muted);margin-top:2px;direction:ltr;text-align:right;}
.req-tier{font-size:12px;color:var(--gold-soft);margin-bottom:10px;}
.status-chip{font-size:10.5px;padding:3px 10px;border-radius:var(--radius-pill);border:1px solid var(--line);}
.status-chip.pending{color:var(--gold-soft);border-color:var(--gold);}
.status-chip.approved{color:#6FE3DC;border-color:var(--success);}
.status-chip.rejected{color:#F2A0A0;border-color:var(--danger);}
.action-btns{display:flex;gap:8px;}
.mini-btn{flex:1;text-align:center;font-size:12px;padding:9px 0;border-radius:10px;border:1px solid var(--line);color:var(--text-muted);}
.mini-btn.approve{border-color:var(--success);color:#6FE3DC;}
.mini-btn.reject{border-color:var(--danger);color:#F2A0A0;}
.empty-state{text-align:center;color:var(--text-muted);font-size:13px;padding:40px 0;}
</style></head>
<body><div class="device"><div class="statusbar"><span>٩:٤١</span><span>●●●</span></div>
<div class="screen">
  <div class="top-row"><a href="22-admin-dashboard.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#F5F7FA" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a><div class="top-title">طلبات القيادة</div><div style="width:38px"></div></div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-filter="pending">قيد المراجعة</div>
    <div class="tab" data-filter="all">الكل</div>
  </div>

  <div id="reqList"><div class="empty-state">جاري التحميل...</div></div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
const STATUS_LABELS = { pending:'قيد المراجعة', approved:'مقبول', rejected:'مرفوض' };
let allReqs = [];
let currentFilter = 'pending';

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function render(){
  const list = document.getElementById('reqList');
  const filtered = currentFilter === 'pending' ? allReqs.filter(r => r.status === 'pending') : allReqs;

  if(filtered.length === 0){
    list.innerHTML = '<div class="empty-state">ماكو طلبات بهذا القسم</div>';
    return;
  }

  list.innerHTML = filtered.map(r => {
    const name = (r.profiles && r.profiles.full_name) || 'مستخدم';
    const phone = (r.profiles && r.profiles.phone) || '';
    const actions = r.status === 'pending'
      ? `<div class="action-btns">
           <div class="mini-btn approve" onclick="review('${r.id}','approve')">قبول</div>
           <div class="mini-btn reject" onclick="review('${r.id}','reject')">رفض</div>
         </div>`
      : '';
    return `
      <div class="req-card">
        <div class="req-head">
          <div>
            <div class="req-name">${escapeHtml(name)}</div>
            <div class="req-phone">${escapeHtml(phone)}</div>
          </div>
          <div class="status-chip ${r.status}">${STATUS_LABELS[r.status] || r.status}</div>
        </div>
        <div class="req-tier">الطلب: ${escapeHtml(r.requested_tier)}</div>
        ${actions}
      </div>`;
  }).join('');
}

document.getElementById('tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if(!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.filter;
  render();
});

async function loadReqs(){
  const { data, error } = await supabaseClient
    .from('leader_requests')
    .select('id, user_id, requested_tier, status, created_at, profiles!leader_requests_user_id_fkey(full_name, phone)')
    .order('created_at', { ascending: false });

  if(error){
    document.getElementById('reqList').innerHTML = '<div class="empty-state">تعذر تحميل الطلبات: ' + error.message + '</div>';
    return;
  }
  allReqs = data || [];
  render();
}

async function review(reqId, action){
  const confirmMsg = action === 'approve' ? 'تأكيد قبول هذا الطلب؟' : 'تأكيد رفض هذا الطلب؟';
  if(!confirm(confirmMsg)) return;

  const fn = action === 'approve' ? 'admin_approve_leader' : 'admin_reject_leader';
  const { error } = await supabaseClient.rpc(fn, { p_request_id: reqId });
  if(error){ alert('خطأ: ' + error.message); return; }
  await loadReqs();
}

async function init(){
  const admin = await requireAdmin();
  if(!admin) return;
  loadReqs();
}
init();
</script>
</body></html>
