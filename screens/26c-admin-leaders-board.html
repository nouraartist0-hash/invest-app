<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="color-scheme" content="dark"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/favicon.ico" sizes="any">
<link rel="icon" href="../assets/icons/favicon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="../assets/icons/favicon-16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
<meta name="theme-color" content="#0D1623">

<title>لوحة القادة</title><link rel="stylesheet" href="../assets/style.css?v=1784451053">
<style>
.tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;}
.tab{padding:8px 16px;border-radius:var(--radius-pill);font-size:12.5px;border:1px solid var(--line);color:var(--text-muted);white-space:nowrap;}
.tab.active{background:var(--gold);color:#241A05;border-color:var(--gold);font-weight:700;}
.leader-card{background:var(--bg-surface);border:1px solid var(--line);border-radius:var(--radius-card);padding:14px 16px;margin-bottom:10px;}
.leader-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.leader-name{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--cream);}
.leader-phone{font-size:11px;color:var(--text-muted);margin-top:2px;direction:ltr;text-align:right;}
.leader-tier-chip{font-size:10.5px;color:var(--gold-soft);border:1px solid var(--gold);border-radius:var(--radius-pill);padding:3px 10px;margin-top:4px;display:inline-block;}
.member-count{text-align:center;}
.member-num{font-family:var(--font-display);font-weight:900;font-size:18px;color:var(--gold-soft);}
.member-label{font-size:10px;color:var(--text-muted);}
.breakdown-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;border-top:1px solid var(--line);padding-top:10px;}
.breakdown-box{text-align:center;background:var(--bg-deep);border-radius:8px;padding:8px 4px;}
.breakdown-num{font-family:var(--font-display);font-weight:800;font-size:14px;color:var(--cream);}
.breakdown-num.warn{color:var(--terracotta);}
.breakdown-num.a{color:#D9A63A;}
.breakdown-num.b{color:#6FE3DC;}
.breakdown-num.c{color:#9DA8B8;}
.breakdown-label{font-size:9.5px;color:var(--text-muted);margin-top:2px;}
.empty-state{text-align:center;color:var(--text-muted);font-size:13px;padding:40px 0;}
.sort-row{display:flex;justify-content:flex-end;margin-bottom:12px;}
.sort-btn{font-size:11.5px;color:var(--text-muted);border:1px solid var(--line);border-radius:var(--radius-pill);padding:5px 12px;}
</style></head>
<body><div class="device"><div class="statusbar"><span>٩:٤١</span><span>●●●</span></div>
<div class="screen">
  <div class="top-row"><a href="22-admin-dashboard.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#F5F7FA" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a><div class="top-title">لوحة القادة</div><div style="width:38px"></div></div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-filter="all">الكل</div>
    <div class="tab" data-filter="VIP A">VIP A</div>
    <div class="tab" data-filter="VIP B">VIP B</div>
    <div class="tab" data-filter="VIP C">VIP C</div>
  </div>

  <div class="sort-row"><div class="sort-btn" id="sortBtn">ترتيب حسب عدد الأعضاء ↓</div></div>

  <div id="leadersList"><div class="empty-state">جاري التحميل...</div></div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
let leaders = [];
let currentFilter = 'all';
let sortDesc = true;

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function render(){
  const list = document.getElementById('leadersList');
  let filtered = currentFilter === 'all' ? leaders : leaders.filter(l => l.leader_tier === currentFilter);
  filtered = [...filtered].sort((a, b) => sortDesc ? b.memberCount - a.memberCount : a.memberCount - b.memberCount);

  if(filtered.length === 0){
    list.innerHTML = '<div class="empty-state">ماكو قادة معتمدين بهذا التصنيف</div>';
    return;
  }

  list.innerHTML = filtered.map(l => `
    <div class="leader-card">
      <div class="leader-top">
        <div>
          <div class="leader-name">${escapeHtml(l.full_name || 'مستخدم')}</div>
          <div class="leader-phone">${escapeHtml(l.phone || '')}</div>
          <div class="leader-tier-chip">${escapeHtml(l.leader_tier)}</div>
        </div>
        <div class="member-count">
          <div class="member-num">${l.memberCount}</div>
          <div class="member-label">عضو مباشر</div>
        </div>
      </div>
      <div class="breakdown-grid">
        <div class="breakdown-box"><div class="breakdown-num warn">${l.noPurchaseCount}</div><div class="breakdown-label">بدون شراء</div></div>
        <div class="breakdown-box"><div class="breakdown-num a">${l.vipACount}</div><div class="breakdown-label">مشتري VIP A</div></div>
        <div class="breakdown-box"><div class="breakdown-num b">${l.vipBCount}</div><div class="breakdown-label">مشتري VIP B</div></div>
        <div class="breakdown-box"><div class="breakdown-num c">${l.vipCCount}</div><div class="breakdown-label">مشتري VIP C</div></div>
      </div>
    </div>`).join('');
}

document.getElementById('tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if(!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.filter;
  render();
});

document.getElementById('sortBtn').addEventListener('click', () => {
  sortDesc = !sortDesc;
  document.getElementById('sortBtn').textContent = 'ترتيب حسب عدد الأعضاء ' + (sortDesc ? '↓' : '↑');
  render();
});

async function loadLeaders(){
  const { data: profs, error } = await supabaseClient
    .from('profiles')
    .select('id, full_name, phone, leader_tier')
    .eq('is_leader', true);

  if(error){
    document.getElementById('leadersList').innerHTML = '<div class="empty-state">تعذر تحميل القادة: ' + error.message + '</div>';
    return;
  }

  const list = profs || [];
  if(list.length === 0){ leaders = []; render(); return; }

  const leaderIds = list.map(p => p.id);

  // كل الأعضاء المسجلين بإحالة مباشرة من أي قائد
  const { data: refs } = await supabaseClient
    .from('profiles')
    .select('id, referred_by')
    .in('referred_by', leaderIds);

  const members = refs || [];
  const memberIds = members.map(m => m.id);

  // استثمارات هذولاء الأعضاء (نشطة أو مكتملة) مع تصنيف العرض
  let investments = [];
  if(memberIds.length > 0){
    const { data: invs } = await supabaseClient
      .from('investments')
      .select('user_id, status, offers(tier)')
      .in('user_id', memberIds)
      .in('status', ['active', 'completed']);
    investments = invs || [];
  }

  // خريطة: عضو -> مجموعة تصنيفات العروض اللي اشتراها
  const memberTiers = {};
  investments.forEach(inv => {
    const tier = inv.offers && inv.offers.tier;
    if(!tier) return;
    if(!memberTiers[inv.user_id]) memberTiers[inv.user_id] = new Set();
    memberTiers[inv.user_id].add(tier);
  });

  leaders = list.map(leader => {
    const myMembers = members.filter(m => m.referred_by === leader.id);
    let noPurchaseCount = 0, vipACount = 0, vipBCount = 0, vipCCount = 0;
    myMembers.forEach(m => {
      const tiers = memberTiers[m.id];
      if(!tiers || tiers.size === 0){ noPurchaseCount++; return; }
      if(tiers.has('VIP A')) vipACount++;
      if(tiers.has('VIP B')) vipBCount++;
      if(tiers.has('VIP C')) vipCCount++;
    });
    return {
      ...leader,
      memberCount: myMembers.length,
      noPurchaseCount, vipACount, vipBCount, vipCCount
    };
  });

  render();
}

async function init(){
  const admin = await requireAdmin();
  if(!admin) return;
  loadLeaders();
}
init();
</script>
</body></html>
