<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="color-scheme" content="dark"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/favicon.ico" sizes="any">
<link rel="icon" href="../assets/icons/favicon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="../assets/icons/favicon-16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
<meta name="theme-color" content="#0D1623">

<title>تعديل نسب عمولة القادة</title><link rel="stylesheet" href="../assets/style.css?v=1784451053">
<style>
.set-row{display:flex;justify-content:space-between;align-items:center;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
.set-row span{font-size:14px;color:var(--cream);}
.set-val{font-size:13px;color:var(--gold-soft);font-weight:700;}

.panel-overlay{position:absolute;inset:0;background:rgba(13,22,35,.82);display:none;align-items:flex-end;z-index:20;}
.panel-overlay.open{display:flex;}
.panel-sheet{width:100%;overflow-y:auto;background:var(--bg-deep);border-top:1px solid var(--gold);
  border-radius:20px 20px 0 0;padding:20px 22px 26px;}
.panel-title{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--cream);margin-bottom:16px;}
.panel-msg{font-size:12.5px;text-align:center;margin-bottom:10px;display:none;}
</style></head>
<body><div class="device"><div class="statusbar"><span>٩:٤١</span><span>●●●</span></div>
<div class="screen">
  <div class="top-row"><a href="22-admin-dashboard.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#F5F7FA" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a><div class="top-title">تعديل نسب القادة</div><div style="width:38px"></div></div>

  <div class="card-sub" style="text-align:center;line-height:1.9;margin-bottom:16px;">أي تعديل هنا ينعكس فورًا على كل القادة الحاليين وعلى صفحة طلب القيادة (VIP A / B / C)</div>

  <div id="ratesList">
    <div class="set-row"><span>جاري التحميل...</span><div class="set-val"></div></div>
  </div>

  <!-- لوحة تعديل النسبة -->
  <div class="panel-overlay" id="numOverlay">
    <div class="panel-sheet">
      <div class="panel-title" id="numTitle">تعديل النسبة</div>
      <div id="numMsg" class="panel-msg"></div>
      <div class="field-group"><label class="label" id="numLabel">النسبة (٪)</label>
        <div class="field"><input id="numInput" type="number" step="0.01" min="0" max="100"/></div></div>
      <button class="cta" id="numSaveBtn">حفظ</button>
      <button class="cta outline" id="numCancelBtn">إلغاء</button>
    </div>
  </div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
// نفس مفاتيح system_settings المستخدمة أصلاً بصفحة إعدادات النظام (26-admin-settings.html)
const RATES_DEF = [
  { key:'leader_commission_vip_a', label:'قائد VIP A', unit:'٪' },
  { key:'leader_commission_vip_b', label:'قائد VIP B', unit:'٪' },
  { key:'leader_commission_vip_c', label:'قائد VIP C', unit:'٪' }
];

let ratesMap = {};
let editingDef = null;
let adminUser = null;

function renderRates(){
  const el = document.getElementById('ratesList');
  el.innerHTML = RATES_DEF.map(def => `
    <div class="set-row" data-key="${def.key}">
      <span>${def.label}</span>
      <div class="set-val">${ratesMap[def.key] ?? '—'}${def.unit} ›</div>
    </div>`).join('');
}

async function loadRates(){
  adminUser = await requireAdmin();
  if(!adminUser) return;

  const { data, error } = await supabaseClient
    .from('system_settings')
    .select('key, value')
    .in('key', RATES_DEF.map(d => d.key));

  if(error){
    document.getElementById('ratesList').innerHTML = '<div class="set-row"><span>تعذر تحميل النسب: ' + error.message + '</span></div>';
    return;
  }
  (data || []).forEach(row => { ratesMap[row.key] = row.value; });
  renderRates();
}

document.getElementById('ratesList').addEventListener('click', (e) => {
  const row = e.target.closest('.set-row');
  if(!row || !row.dataset.key) return;
  editingDef = RATES_DEF.find(d => d.key === row.dataset.key);
  if(!editingDef) return;

  document.getElementById('numTitle').textContent = 'تعديل نسبة ' + editingDef.label;
  document.getElementById('numLabel').textContent = 'النسبة (' + editingDef.unit + ')';
  document.getElementById('numInput').value = ratesMap[editingDef.key] ?? '';
  document.getElementById('numMsg').style.display = 'none';
  document.getElementById('numOverlay').classList.add('open');
});

document.getElementById('numCancelBtn').addEventListener('click', () => document.getElementById('numOverlay').classList.remove('open'));
document.getElementById('numOverlay').addEventListener('click', (e) => { if(e.target.id === 'numOverlay') document.getElementById('numOverlay').classList.remove('open'); });

document.getElementById('numSaveBtn').addEventListener('click', async () => {
  const val = document.getElementById('numInput').value;
  if(val === '' || isNaN(Number(val)) || Number(val) < 0 || Number(val) > 100){
    const el = document.getElementById('numMsg');
    el.textContent = 'أدخل نسبة صحيحة بين ٠ و ١٠٠'; el.style.display = 'block'; el.style.color = '#E15A5A';
    return;
  }
  const btn = document.getElementById('numSaveBtn');
  btn.disabled = true;
  const originalText = btn.textContent;
  btn.textContent = 'جاري الحفظ...';

  const { error } = await supabaseClient.from('system_settings')
    .upsert({ key: editingDef.key, value: String(Number(val)), updated_at: new Date().toISOString(), updated_by: adminUser.id }, { onConflict: 'key' });

  btn.disabled = false; btn.textContent = originalText;

  if(error){
    const el = document.getElementById('numMsg');
    el.textContent = 'خطأ: ' + error.message; el.style.display = 'block'; el.style.color = '#E15A5A';
    return;
  }
  ratesMap[editingDef.key] = String(Number(val));
  document.getElementById('numOverlay').classList.remove('open');
  renderRates();
});

loadRates();
</script>
</body></html>
