<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="color-scheme" content="dark"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>28 — محادثة الدعم</title><link rel="stylesheet" href="../assets/style.css?v=1784451053">
<style>
.msg-row{display:flex;flex-direction:column;margin-bottom:10px;}
.msg-row.out{align-items:flex-end;}
.msg-row.in{align-items:flex-start;}
.msg{max-width:78%;padding:12px 14px;border-radius:16px;font-size:13.5px;line-height:1.7;word-break:break-word;}
.msg.in{background:var(--bg-surface);border:1px solid var(--line);color:var(--cream);border-bottom-right-radius:4px;}
.msg.out{background:var(--gold);color:#1C1500;border-bottom-left-radius:4px;}
.msg-meta{font-size:10px;color:var(--text-muted);margin-top:3px;padding:0 2px;}
.msg-img{max-width:100%;border-radius:12px;display:block;margin-bottom:6px;cursor:pointer;}
.msg-file{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.15);border-radius:10px;padding:8px 10px;margin-bottom:6px;font-size:12px;}
.chat-area{display:flex;flex-direction:column;flex:1;overflow-y:auto;padding-bottom:10px;}
.empty-state{text-align:center;color:var(--text-muted);font-size:13px;padding:50px 0;}
.day-sep{text-align:center;font-size:11px;color:var(--text-muted);margin:14px 0 10px;}
.input-bar{display:flex;gap:10px;align-items:center;padding:12px 0 26px;}
.input-bar input{flex:1;background:var(--bg-surface);border:1px solid var(--line);border-radius:var(--radius-pill);
  padding:12px 16px;color:var(--cream);font-family:var(--font-body);outline:none;}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;cursor:pointer;}
.send-btn:disabled{opacity:.5;}
</style></head>
<body><div class="device"><div class="statusbar"><span>٩:٤١</span><span>●●●</span></div>
<div class="screen">
  <div class="top-row"><a href="27-admin-support.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#F3EEDD" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a><div class="top-title" id="chatTitle">محادثة الدعم</div><div style="width:38px"></div></div>

  <div class="chat-area" id="chatArea"><div class="empty-state">جاري التحميل...</div></div>

  <div class="input-bar">
    <input type="text" id="msgInput" placeholder="اكتب ردك..."/>
    <button class="send-btn" id="sendBtn" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1C1500" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js?v=1784451053"></script>
<script>
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

const params = new URLSearchParams(location.search);
const targetUserId = params.get('uid');

let currentAdmin = null;
const renderedIds = new Set();
let lastDayLabel = null;

function formatTime(iso){
  const d = new Date(iso);
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  return toArabicDigits(h) + ':' + toArabicDigits(m);
}

function dayLabel(iso){
  const d = new Date(iso);
  const today = new Date();
  const yesterday = new Date(); yesterday.setDate(today.getDate()-1);
  const sameDay = (a,b)=>a.toDateString()===b.toDateString();
  if (sameDay(d, today)) return 'اليوم';
  if (sameDay(d, yesterday)) return 'أمس';
  return d.toLocaleDateString('ar-EG', { day:'numeric', month:'long' });
}

function isImageUrl(url){
  return /\.(png|jpe?g|gif|webp)$/i.test(url || '');
}

function renderMessage(m){
  if (renderedIds.has(m.id)) return;
  renderedIds.add(m.id);

  const chatArea = document.getElementById('chatArea');
  const empty = chatArea.querySelector('.empty-state');
  if (empty) empty.remove();

  const dl = dayLabel(m.created_at);
  if (dl !== lastDayLabel) {
    lastDayLabel = dl;
    const sep = document.createElement('div');
    sep.className = 'day-sep';
    sep.textContent = dl;
    chatArea.appendChild(sep);
  }

  // من منظور الأدمن: رسائل الأدمن نفسه تظهر يمين (out)، ورسائل المستخدم تظهر يسار (in)
  const isOut = m.sender === 'admin';
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isOut ? 'out' : 'in');

  let attachHtml = '';
  if (m.attachment_url) {
    if (isImageUrl(m.attachment_url)) {
      attachHtml = `<img class="msg-img" src="${escapeHtml(m.attachment_url)}" onclick="window.open('${escapeHtml(m.attachment_url)}','_blank')">`;
    } else {
      attachHtml = `<div class="msg-file"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg><a href="${escapeHtml(m.attachment_url)}" target="_blank" style="color:inherit">مرفق</a></div>`;
    }
  }

  row.innerHTML = `
    <div class="msg ${isOut ? 'out':'in'}">${attachHtml}${m.message ? escapeHtml(m.message) : ''}</div>
    <div class="msg-meta">${formatTime(m.created_at)}</div>
  `;
  chatArea.appendChild(row);
}

function scrollToBottom(){
  const chatArea = document.getElementById('chatArea');
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function markUserMessagesRead(){
  await supabaseClient
    .from('support_messages')
    .update({ is_read: true })
    .eq('user_id', targetUserId)
    .eq('sender', 'user')
    .eq('is_read', false);
}

async function loadUserName(){
  const { data } = await supabaseClient.from('profiles').select('full_name, phone').eq('id', targetUserId).maybeSingle();
  if (data) document.getElementById('chatTitle').textContent = data.full_name || data.phone || 'محادثة الدعم';
}

async function loadMessages(){
  const { data, error } = await supabaseClient
    .from('support_messages')
    .select('id, sender, message, attachment_url, is_read, created_at')
    .eq('user_id', targetUserId)
    .order('created_at', { ascending: true });

  const chatArea = document.getElementById('chatArea');

  if (error) {
    chatArea.innerHTML = `<div class="empty-state">تعذر تحميل الرسائل: ${escapeHtml(error.message)}</div>`;
    return;
  }

  if (!data || data.length === 0) {
    chatArea.innerHTML = `<div class="empty-state">لا توجد رسائل بعد</div>`;
  } else {
    chatArea.innerHTML = '';
    data.forEach(renderMessage);
    scrollToBottom();
  }

  markUserMessagesRead();
}

async function sendMessage(){
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  try {
    const { data, error } = await supabaseClient
      .from('support_messages')
      .insert({ user_id: targetUserId, sender: 'admin', message: text, is_read: false })
      .select()
      .single();

    if (error) {
      alert('تعذر إرسال الرد: ' + error.message);
      return;
    }

    renderMessage(data);
    scrollToBottom();
    input.value = '';
  } finally {
    sendBtn.disabled = false;
  }
}

function subscribeRealtime(){
  supabaseClient
    .channel('admin_support_' + targetUserId)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'support_messages',
      filter: `user_id=eq.${targetUserId}`
    }, (payload) => {
      if (payload.eventType === 'INSERT') {
        renderMessage(payload.new);
        scrollToBottom();
        if (payload.new.sender === 'user') markUserMessagesRead();
      }
    })
    .subscribe();
}

async function init(){
  if (!targetUserId) {
    document.getElementById('chatArea').innerHTML = '<div class="empty-state">لم يتم تحديد المستخدم</div>';
    return;
  }
  currentAdmin = await requireAdmin();
  if (!currentAdmin) return;

  await loadUserName();
  await loadMessages();
  subscribeRealtime();

  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  document.getElementById('msgInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
}

init();
</script>
</body></html>
