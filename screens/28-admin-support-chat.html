<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعم الأدمن — GoldenFarm</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0f1115;
    --panel:#161a21;
    --panel-2:#1d222b;
    --border:#262c37;
    --text:#e7e9ee;
    --muted:#8a92a3;
    --accent:#3fae6a;
    --accent-dim:#2b7a4b;
    --danger:#d9534f;
    --bubble-admin:#22303f;
    --bubble-user:#242a33;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Segoe UI", Tahoma, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    height:100vh;
    overflow:hidden;
  }
  .layout{display:flex;height:100vh;}

  /* ===== Sidebar ===== */
  .sidebar{
    width:300px;
    min-width:300px;
    background:var(--panel);
    border-left:1px solid var(--border);
    display:flex;
    flex-direction:column;
  }
  .sidebar-header{
    padding:16px;
    border-bottom:1px solid var(--border);
    font-weight:700;
    font-size:15px;
  }
  .sidebar-header span{color:var(--muted); font-weight:400; font-size:12px; display:block; margin-top:2px;}
  .conv-list{flex:1; overflow-y:auto;}
  .conv-item{
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
  }
  .conv-item:hover{background:var(--panel-2);}
  .conv-item.active{background:var(--panel-2); border-right:3px solid var(--accent);}
  .conv-name{font-size:14px; font-weight:600;}
  .conv-preview{font-size:12px; color:var(--muted); margin-top:3px; max-width:190px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .conv-meta{display:flex; flex-direction:column; align-items:flex-end; gap:4px;}
  .badge{background:var(--accent); color:#0b0f13; font-size:11px; font-weight:700; padding:1px 7px; border-radius:20px;}
  .status-dot{width:8px; height:8px; border-radius:50%;}
  .status-open{background:var(--accent);}
  .status-closed{background:var(--muted);}

  /* ===== Chat area ===== */
  .chat{flex:1; display:flex; flex-direction:column; min-width:0;}
  .chat-header{
    padding:14px 20px;
    background:var(--panel);
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .chat-title{font-weight:700; font-size:15px;}
  .chat-sub{font-size:12px; color:var(--muted); margin-top:2px;}
  .typing-indicator{font-size:12px; color:var(--accent); margin-top:2px; height:14px;}
  .btn{
    border:none;
    border-radius:8px;
    padding:8px 14px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-close-conv{background:var(--danger); color:#fff;}
  .btn-open-conv{background:var(--accent); color:#0b0f13;}

  .messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .msg-row{display:flex; max-width:70%;}
  .msg-row.from-admin{align-self:flex-start; flex-direction:row;}
  .msg-row.from-user{align-self:flex-end; flex-direction:row-reverse;}
  .bubble{
    padding:10px 14px;
    border-radius:var(--radius);
    position:relative;
    font-size:14px;
    line-height:1.5;
  }
  .from-admin .bubble{background:var(--bubble-admin); border-bottom-left-radius:4px;}
  .from-user .bubble{background:var(--bubble-user); border-bottom-right-radius:4px;}
  .bubble img{max-width:220px; border-radius:10px; display:block; margin-top:6px; cursor:pointer;}
  .bubble .edited-tag{font-size:10px; color:var(--muted); margin-right:6px;}
  .msg-meta{font-size:11px; color:var(--muted); margin-top:4px;}
  .msg-actions{
    display:none;
    gap:6px;
    margin-top:6px;
  }
  .msg-row:hover .msg-actions{display:flex;}
  .msg-actions button{
    background:none;
    border:none;
    color:var(--muted);
    font-size:11px;
    cursor:pointer;
    padding:0;
  }
  .msg-actions button:hover{color:var(--text);}
  .msg-deleted{font-style:italic; color:var(--muted);}

  .composer{
    border-top:1px solid var(--border);
    background:var(--panel);
    padding:12px 16px;
    display:flex;
    align-items:flex-end;
    gap:10px;
  }
  .composer textarea{
    flex:1;
    resize:none;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    padding:10px 12px;
    font-size:14px;
    font-family:inherit;
    max-height:120px;
    min-height:42px;
  }
  .composer textarea:focus{outline:1px solid var(--accent);}
  .icon-btn{
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--text);
    width:42px;
    height:42px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .icon-btn:hover{background:var(--border);}
  .send-btn{background:var(--accent); color:#0b0f13; font-weight:700;}
  .send-btn:disabled{opacity:.5; cursor:default;}
  .image-preview-wrap{position:relative; display:inline-block; margin-bottom:8px;}
  .image-preview-wrap img{max-height:70px; border-radius:8px;}
  .image-preview-wrap button{
    position:absolute; top:-6px; left:-6px;
    background:var(--danger); color:#fff; border:none;
    border-radius:50%; width:18px; height:18px; font-size:11px; cursor:pointer;
  }

  .empty-state{
    flex:1; display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:14px;
  }

  /* edit mode */
  .edit-box{display:flex; gap:6px; align-items:center; margin-top:4px;}
  .edit-box textarea{
    background:var(--panel-2); border:1px solid var(--accent); border-radius:8px;
    color:var(--text); padding:6px 8px; font-size:13px; font-family:inherit; width:220px;
  }
  .edit-box button{font-size:11px; padding:4px 8px; border-radius:6px; border:none; cursor:pointer;}
  .edit-save{background:var(--accent); color:#0b0f13;}
  .edit-cancel{background:var(--panel); color:var(--muted); border:1px solid var(--border) !important;}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:10px;}
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar: conversation list -->
  <div class="sidebar">
    <div class="sidebar-header">
      المحادثات
      <span>GoldenFarm — دعم الأدمن</span>
    </div>
    <div class="conv-list" id="convList"></div>
  </div>

  <!-- Chat -->
  <div class="chat" id="chatPanel">
    <div class="empty-state" id="emptyState">اختر محادثة من القائمة</div>

    <div id="chatContent" style="display:none; flex:1; display:none; flex-direction:column;">
      <div class="chat-header">
        <div>
          <div class="chat-title" id="chatTitle">—</div>
          <div class="chat-sub" id="chatSub">—</div>
          <div class="typing-indicator" id="typingIndicator"></div>
        </div>
        <button class="btn" id="toggleConvBtn">—</button>
      </div>

      <div class="messages" id="messagesEl"></div>

      <div class="composer">
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        <button class="icon-btn" id="attachBtn" title="إرفاق صورة">📎</button>
        <div style="flex:1; display:flex; flex-direction:column;">
          <div id="imagePreviewArea"></div>
          <textarea id="msgInput" placeholder="اكتب ردك..." rows="1"></textarea>
        </div>
        <button class="icon-btn send-btn" id="sendBtn" title="إرسال">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ================= CONFIG — عدّل هذا القسم حسب مشروعك ================= */
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

const TABLE_CONVERSATIONS = "conversations";   // id, user_name, status(open/closed), updated_at
const TABLE_MESSAGES = "messages";             // id, conversation_id, sender(admin/user), text, image_url, created_at, edited, deleted
const STORAGE_BUCKET = "chat-images";
const ADMIN_SENDER = "admin";
/* ======================================================================= */

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentConvId = null;
let currentConvStatus = "open";
let pendingImageFile = null;
let typingChannel = null;
let typingTimeout = null;

const convListEl = document.getElementById("convList");
const emptyStateEl = document.getElementById("emptyState");
const chatContentEl = document.getElementById("chatContent");
const chatTitleEl = document.getElementById("chatTitle");
const chatSubEl = document.getElementById("chatSub");
const typingIndicatorEl = document.getElementById("typingIndicator");
const toggleConvBtn = document.getElementById("toggleConvBtn");
const messagesEl = document.getElementById("messagesEl");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const attachBtn = document.getElementById("attachBtn");
const imageInput = document.getElementById("imageInput");
const imagePreviewArea = document.getElementById("imagePreviewArea");

/* ---------------- Conversations list ---------------- */
async function loadConversations() {
  const { data, error } = await supabase
    .from(TABLE_CONVERSATIONS)
    .select("*")
    .order("updated_at", { ascending: false });

  if (error) { console.error(error); return; }
  renderConversations(data || []);
}

function renderConversations(convs) {
  convListEl.innerHTML = "";
  convs.forEach(conv => {
    const item = document.createElement("div");
    item.className = "conv-item" + (conv.id === currentConvId ? " active" : "");
    item.innerHTML = `
      <div>
        <div class="conv-name">${escapeHtml(conv.user_name || ("محادثة #" + conv.id))}</div>
        <div class="conv-preview">${escapeHtml(conv.last_message_preview || "")}</div>
      </div>
      <div class="conv-meta">
        <span class="status-dot ${conv.status === 'closed' ? 'status-closed' : 'status-open'}"></span>
        ${conv.unread_count ? `<span class="badge">${conv.unread_count}</span>` : ""}
      </div>
    `;
    item.addEventListener("click", () => openConversation(conv));
    convListEl.appendChild(item);
  });
}

/* ---------------- Open a conversation ---------------- */
async function openConversation(conv) {
  currentConvId = conv.id;
  currentConvStatus = conv.status || "open";

  emptyStateEl.style.display = "none";
  chatContentEl.style.display = "flex";

  chatTitleEl.textContent = conv.user_name || ("محادثة #" + conv.id);
  chatSubEl.textContent = "الحالة: " + (currentConvStatus === "closed" ? "مغلقة" : "مفتوحة");
  updateToggleButton();

  await loadConversations(); // refresh active highlight
  await loadMessages();
  subscribeToMessages();
  subscribeToTyping();
}

function updateToggleButton() {
  if (currentConvStatus === "closed") {
    toggleConvBtn.textContent = "فتح المحادثة";
    toggleConvBtn.className = "btn btn-open-conv";
  } else {
    toggleConvBtn.textContent = "إغلاق المحادثة";
    toggleConvBtn.className = "btn btn-close-conv";
  }
}

toggleConvBtn.addEventListener("click", async () => {
  if (!currentConvId) return;
  const newStatus = currentConvStatus === "closed" ? "open" : "closed";
  const { error } = await supabase
    .from(TABLE_CONVERSATIONS)
    .update({ status: newStatus })
    .eq("id", currentConvId);
  if (error) { console.error(error); return; }
  currentConvStatus = newStatus;
  chatSubEl.textContent = "الحالة: " + (newStatus === "closed" ? "مغلقة" : "مفتوحة");
  updateToggleButton();
  loadConversations();
});

/* ---------------- Messages ---------------- */
async function loadMessages() {
  const { data, error } = await supabase
    .from(TABLE_MESSAGES)
    .select("*")
    .eq("conversation_id", currentConvId)
    .order("created_at", { ascending: true });

  if (error) { console.error(error); return; }
  messagesEl.innerHTML = "";
  (data || []).forEach(renderMessage);
  scrollToBottom();
}

function renderMessage(msg) {
  const row = document.createElement("div");
  row.className = "msg-row " + (msg.sender === ADMIN_SENDER ? "from-admin" : "from-user");
  row.dataset.id = msg.id;

  if (msg.deleted) {
    row.innerHTML = `<div class="bubble msg-deleted">تم حذف هذه الرسالة</div>`;
    messagesEl.appendChild(row);
    return;
  }

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  let inner = "";
  if (msg.text) {
    inner += `<span class="msg-text">${escapeHtml(msg.text)}</span>`;
    if (msg.edited) inner += `<span class="edited-tag">(تم التعديل)</span>`;
  }
  if (msg.image_url) {
    inner += `<img src="${msg.image_url}" onclick="window.open('${msg.image_url}','_blank')">`;
  }
  bubble.innerHTML = inner;

  const meta = document.createElement("div");
  meta.className = "msg-meta";
  meta.textContent = formatTime(msg.created_at);
  bubble.appendChild(meta);

  // actions only for admin's own messages
  if (msg.sender === ADMIN_SENDER) {
    const actions = document.createElement("div");
    actions.className = "msg-actions";
    if (msg.text) {
      const editBtn = document.createElement("button");
      editBtn.textContent = "تعديل";
      editBtn.onclick = () => startEdit(row, msg);
      actions.appendChild(editBtn);
    }
    const delBtn = document.createElement("button");
    delBtn.textContent = "حذف";
    delBtn.onclick = () => deleteMessage(msg.id);
    actions.appendChild(delBtn);
    bubble.appendChild(actions);
  }

  row.appendChild(bubble);
  messagesEl.appendChild(row);
}

function startEdit(row, msg) {
  const bubble = row.querySelector(".bubble");
  const box = document.createElement("div");
  box.className = "edit-box";
  box.innerHTML = `
    <textarea>${escapeHtml(msg.text || "")}</textarea>
    <button class="edit-save">حفظ</button>
    <button class="edit-cancel">إلغاء</button>
  `;
  bubble.appendChild(box);
  const textarea = box.querySelector("textarea");
  textarea.focus();

  box.querySelector(".edit-save").onclick = async () => {
    const newText = textarea.value.trim();
    if (!newText) return;
    const { error } = await supabase
      .from(TABLE_MESSAGES)
      .update({ text: newText, edited: true })
      .eq("id", msg.id);
    if (error) console.error(error);
    box.remove();
  };
  box.querySelector(".edit-cancel").onclick = () => box.remove();
}

async function deleteMessage(id) {
  if (!confirm("حذف هذه الرسالة؟")) return;
  const { error } = await supabase
    .from(TABLE_MESSAGES)
    .update({ deleted: true })
    .eq("id", id);
  if (error) console.error(error);
}

/* ---------------- Sending ---------------- */
attachBtn.addEventListener("click", () => imageInput.click());

imageInput.addEventListener("change", () => {
  const file = imageInput.files[0];
  if (!file) return;
  pendingImageFile = file;
  const url = URL.createObjectURL(file);
  imagePreviewArea.innerHTML = `
    <div class="image-preview-wrap">
      <img src="${url}">
      <button id="removeImgBtn">×</button>
    </div>
  `;
  document.getElementById("removeImgBtn").onclick = () => {
    pendingImageFile = null;
    imagePreviewArea.innerHTML = "";
    imageInput.value = "";
  };
});

sendBtn.addEventListener("click", sendMessage);
msgInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
msgInput.addEventListener("input", broadcastTyping);

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text && !pendingImageFile) return;
  if (!currentConvId) return;

  let imageUrl = null;
  if (pendingImageFile) {
    const fileName = `${currentConvId}/${Date.now()}_${pendingImageFile.name}`;
    const { data: uploadData, error: uploadError } = await supabase
      .storage.from(STORAGE_BUCKET)
      .upload(fileName, pendingImageFile);
    if (uploadError) { console.error(uploadError); return; }
    const { data: publicUrlData } = supabase
      .storage.from(STORAGE_BUCKET)
      .getPublicUrl(uploadData.path);
    imageUrl = publicUrlData.publicUrl;
  }

  const { error } = await supabase.from(TABLE_MESSAGES).insert({
    conversation_id: currentConvId,
    sender: ADMIN_SENDER,
    text: text || null,
    image_url: imageUrl,
    edited: false,
    deleted: false,
  });
  if (error) { console.error(error); return; }

  await supabase.from(TABLE_CONVERSATIONS)
    .update({ last_message_preview: text || "📷 صورة", updated_at: new Date().toISOString() })
    .eq("id", currentConvId);

  msgInput.value = "";
  pendingImageFile = null;
  imagePreviewArea.innerHTML = "";
  imageInput.value = "";
  loadConversations();
}

/* ---------------- Realtime: messages ---------------- */
let messagesSubscription = null;
function subscribeToMessages() {
  if (messagesSubscription) supabase.removeChannel(messagesSubscription);
  messagesSubscription = supabase
    .channel("messages-" + currentConvId)
    .on("postgres_changes",
      { event: "*", schema: "public", table: TABLE_MESSAGES, filter: `conversation_id=eq.${currentConvId}` },
      () => loadMessages()
    )
    .subscribe();
}

/* ---------------- Realtime: typing indicator ---------------- */
function subscribeToTyping() {
  if (typingChannel) supabase.removeChannel(typingChannel);
  typingChannel = supabase.channel("typing-" + currentConvId);
  typingChannel
    .on("broadcast", { event: "typing" }, (payload) => {
      if (payload.payload.sender === "user") {
        typingIndicatorEl.textContent = "العميل يكتب الآن...";
        clearTimeout(window._typingClearTimer);
        window._typingClearTimer = setTimeout(() => {
          typingIndicatorEl.textContent = "";
        }, 2500);
      }
    })
    .subscribe();
}

function broadcastTyping() {
  if (!typingChannel || !currentConvId) return;
  clearTimeout(typingTimeout);
  typingChannel.send({
    type: "broadcast",
    event: "typing",
    payload: { sender: ADMIN_SENDER }
  });
}

/* ---------------- Helpers ---------------- */
function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
function formatTime(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  return d.toLocaleTimeString("ar-EG", { hour: "2-digit", minute: "2-digit" });
}
function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

/* ---------------- Init ---------------- */
loadConversations();
setInterval(loadConversations, 15000); // fallback refresh
</script>
</body>
</html>
